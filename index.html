<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>회의 시간, 불편한 것만 알려주세요 — 참석자 화면</title>
<meta name="description" content="보이지 않는 사정을 선명하게 — 회의 시간 조율 참석자 화면 (반응형 showcase)" />
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root{
    --ink:#191F28; --ink-2:#4E5968; --ink-3:#8B95A1; --ink-4:#AEB6C0;
    --blue:#3182F6;
    --ease:cubic-bezier(0.2,0,0,1);
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  body{
    margin:0; color:var(--ink);
    font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
    font-variant-numeric:tabular-nums;
    background:
      radial-gradient(1200px 700px at 50% -10%, #F4F6F9 0%, rgba(244,246,249,0) 60%),
      linear-gradient(180deg, #EAEEF3 0%, #E4E9F0 100%);
    display:flex; flex-direction:column; height:100dvh; overflow:hidden;
  }

  /* ---------- top bar ---------- */
  .top{
    display:flex; align-items:center; gap:16px; flex-wrap:wrap;
    padding:16px 22px; z-index:2;
  }
  .brand{ display:flex; flex-direction:column; gap:1px; margin-right:auto; }
  .brand .t{ font-size:14px; font-weight:700; letter-spacing:-.01em; }
  .brand .s{ font-size:12px; color:var(--ink-3); }
  .controls{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .lbl{ font-size:11px; font-weight:600; color:var(--ink-4); margin-right:2px; }

  .seg{ display:inline-flex; background:rgba(255,255,255,.7); backdrop-filter:blur(8px);
    border-radius:12px; padding:4px; gap:2px; box-shadow:0 1px 2px rgba(16,24,40,.06); }
  .seg button{
    display:inline-flex; align-items:center; gap:6px; min-height:40px;
    border:0; background:transparent; color:var(--ink-3); font:inherit; font-size:13px; font-weight:600;
    padding:6px 12px; border-radius:9px; cursor:pointer;
    transition-property:background-color,color,scale; transition-duration:.18s; transition-timing-function:var(--ease);
  }
  .seg button svg{ width:15px; height:15px; }
  .seg button:active{ scale:.96; }
  .seg button[aria-selected="true"]{ background:#fff; color:var(--ink); box-shadow:0 1px 3px rgba(16,24,40,.12); }

  /* ---------- stage ---------- */
  .viewport{ flex:1; position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center;
    overflow:hidden; padding:8px 24px 12px; }
  .scaler{ transform-origin:center center; will-change:transform;
    transition:transform .38s var(--ease); }

  .device{ position:relative; display:flex; flex-direction:column; }
  /* phone / tablet bezel */
  .device.phone{ background:#0B0C0E; padding:14px; border-radius:52px;
    box-shadow:0 2px 6px rgba(16,24,40,.18), 0 30px 60px rgba(16,24,40,.28), inset 0 0 0 1.5px rgba(255,255,255,.06); }
  .device.phone .screen{ border-radius:38px; overflow:hidden; background:#fff; } /* concentric: 52-14 */
  /* browser chrome */
  .device.browser{ background:#fff; border-radius:16px; overflow:hidden;
    box-shadow:0 2px 6px rgba(16,24,40,.10), 0 30px 60px rgba(16,24,40,.20); }
  .device .chrome{ display:none; height:44px; align-items:center; gap:8px; padding:0 14px; background:#F1F3F6;
    box-shadow:inset 0 -1px 0 rgba(16,24,40,.05); }
  .device.browser .chrome{ display:flex; }
  .device .dots{ display:flex; gap:7px; }
  .device .dots i{ width:11px; height:11px; border-radius:50%; display:block; }
  .device .dots i:nth-child(1){ background:#FF5F57; } .device .dots i:nth-child(2){ background:#FEBC2E; } .device .dots i:nth-child(3){ background:#28C840; }
  .device .url{ flex:1; max-width:340px; margin:0 auto; height:26px; border-radius:8px; background:#fff;
    display:flex; align-items:center; justify-content:center; gap:6px; font-size:11.5px; color:var(--ink-3);
    box-shadow:inset 0 0 0 1px rgba(16,24,40,.06); }
  .device .url svg{ width:11px; height:11px; }
  .device.browser .screen{ overflow:hidden; background:#fff; }

  iframe{ display:block; border:0; background:#fff; }

  .caption{ margin-top:14px; display:flex; align-items:center; gap:8px; color:var(--ink-3); font-size:12px; }
  .caption .dim{ font-variant-numeric:tabular-nums; color:var(--ink-4); font-weight:500; }
  .caption .sep{ color:var(--ink-4); }

  .reveal{ opacity:0; transform:translateY(8px); animation:fadeUp .55s var(--ease) forwards; }
  @keyframes fadeUp{ to{ opacity:1; transform:none; } }
  @media (prefers-reduced-motion:reduce){ .reveal{ animation:none; opacity:1; transform:none; } .scaler{ transition:none; } }

  @media (max-width:640px){
    .top{ padding:12px 14px; gap:10px; }
    .brand{ width:100%; margin:0; }
    .controls{ width:100%; justify-content:space-between; }
    .lbl{ display:none; }
    .caption{ display:none; }
  }
</style>
</head>
<body>
  <div class="top reveal">
    <div class="brand">
      <span class="t">불편한 시간만 알려주세요</span>
      <span class="s">회의 시간 조율 · 참석자 화면</span>
    </div>
    <div class="controls">
      <span class="lbl">참석 유형</span>
      <div class="seg" id="personaSeg" role="tablist" aria-label="참석 유형">
        <button role="tab" aria-selected="true"  data-persona="required">필수</button>
        <button role="tab" aria-selected="false" data-persona="optional">선택</button>
      </div>
      <span class="lbl">디바이스</span>
      <div class="seg" id="deviceSeg" role="tablist" aria-label="디바이스">
        <button role="tab" aria-selected="true" data-device="mobile">
          <svg viewBox="0 0 20 20" fill="none"><rect x="6" y="2.5" width="8" height="15" rx="2" stroke="currentColor" stroke-width="1.6"/><circle cx="10" cy="14.5" r=".9" fill="currentColor"/></svg>모바일</button>
        <button role="tab" aria-selected="false" data-device="tablet">
          <svg viewBox="0 0 20 20" fill="none"><rect x="3.5" y="3" width="13" height="14" rx="2" stroke="currentColor" stroke-width="1.6"/><circle cx="10" cy="14.6" r=".9" fill="currentColor"/></svg>태블릿</button>
        <button role="tab" aria-selected="false" data-device="desktop">
          <svg viewBox="0 0 20 20" fill="none"><rect x="2.5" y="3.5" width="15" height="10" rx="1.8" stroke="currentColor" stroke-width="1.6"/><path d="M7 16.5h6M10 13.5v3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>데스크톱</button>
      </div>
    </div>
  </div>

  <div class="viewport">
    <div class="scaler reveal" id="scaler" style="animation-delay:.08s">
      <div class="device phone" id="device">
        <div class="chrome">
          <span class="dots"><i></i><i></i><i></i></span>
          <span class="url">
            <svg viewBox="0 0 12 12" fill="none"><path d="M4 5.5V4a2 2 0 114 0v1.5M3.2 5.5h5.6v4H3.2z" stroke="#8B95A1" stroke-width="1"/></svg>
            besoluble.github.io/toss-pd-challenge
          </span>
        </div>
        <iframe id="frame" class="screen" src="app.html" title="참석자 화면" scrolling="yes"></iframe>
      </div>
    </div>
    <div class="caption" id="caption"></div>
  </div>

<script>
(function(){
  const DEVICES = {
    mobile:  { w:390,  h:800,  chrome:"phone",   name:"모바일",   maxUp:1.35 },
    tablet:  { w:810,  h:1040, chrome:"phone",   name:"태블릿",   maxUp:1.0 },
    desktop: { w:1280, h:800,  chrome:"browser", name:"데스크톱", maxUp:1.0 },
  };
  const device = document.getElementById("device");
  const frame  = document.getElementById("frame");
  const scaler = document.getElementById("scaler");
  const viewport = document.querySelector(".viewport");
  const caption = document.getElementById("caption");
  let current = "mobile", persona = "required";

  function apply(key){
    const d = DEVICES[key]; current = key;
    device.classList.remove("phone","browser");
    device.classList.add(d.chrome);
    frame.style.width  = d.w + "px";
    frame.style.height = d.h + "px";
    caption.innerHTML = '<span class="dim">'+d.w+' × '+d.h+'</span><span class="sep">·</span>'+d.name+' 미리보기';
    fit();
  }
  function fit(){
    // natural (unscaled) device size
    const ow = device.offsetWidth, oh = device.offsetHeight;
    const availW = viewport.clientWidth  - 8;
    const availH = viewport.clientHeight - 64; // leave room for caption
    const d = DEVICES[current];
    const scale = Math.min(availW/ow, availH/oh, d.maxUp);
    scaler.style.transform = "scale(" + Math.max(0.2, scale) + ")";
  }

  // device selector
  document.querySelectorAll("#deviceSeg button").forEach(b=>{
    b.addEventListener("click", ()=>{
      document.querySelectorAll("#deviceSeg button").forEach(x=>x.setAttribute("aria-selected","false"));
      b.setAttribute("aria-selected","true");
      apply(b.dataset.device);
    });
  });
  // persona selector -> postMessage into iframe
  function pushPersona(){ try{ frame.contentWindow.postMessage({type:"persona",value:persona},"*"); }catch(e){} }
  document.querySelectorAll("#personaSeg button").forEach(b=>{
    b.addEventListener("click", ()=>{
      document.querySelectorAll("#personaSeg button").forEach(x=>x.setAttribute("aria-selected","false"));
      b.setAttribute("aria-selected","true");
      persona = b.dataset.persona; pushPersona();
    });
  });

  frame.addEventListener("load", pushPersona);
  let rt; window.addEventListener("resize", ()=>{ clearTimeout(rt); rt=setTimeout(fit, 60); });
  apply("mobile");
  window.addEventListener("load", fit);
})();
</script>
</body>
</html>
